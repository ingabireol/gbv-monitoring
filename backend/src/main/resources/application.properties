spring.application.name=backend
server.port=8083
spring.config.import=optional:file:.env.example[.properties],optional:file:.env[.properties],optional:file:backend/.env.example[.properties],optional:file:backend/.env[.properties]

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/gbvmonitor
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# JWT
gbvmonitor.jwt.secret=${JWT_SECRET:replace-this-with-a-long-random-32-byte-secret}
gbvmonitor.jwt.expiration=86400000
gbvmonitor.verification.pin-expiration-minutes=10
gbvmonitor.mail.from=${MAIL_FROM:no-reply@gbvmonitor.local}

# Email verification PIN delivery
# Configure these for your SMTP provider before testing email PIN delivery.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Demo data seeding — set to true to load 13 sample cases, referrals, chat messages, etc.
# Run the app once without this flag first (so DataSeeder creates base users), then enable and restart.
gbvmonitor.seed.demo-data=true

# WebSocket
spring.websocket.path=/ws

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
